<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resonant Ecologies</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="map"></div>
  <div id="top-link"><a id="about-link">About the Project</a></div>

  <!-- Intro overlay — frosted glass panel -->
  <div id="intro">
    <div class="panel">

      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="en">EN</button>
        <span class="lang-sep">/</span>
        <button class="lang-btn" data-lang="es">ES</button>
      </div>

      <h1 class="title">Resonant Ecologies</h1>
      <p class="subtitle" id="subtitle-text"></p>
      <div class="divider"></div>
      <p class="method" id="method-text"></p>

      <button class="enter-btn" id="enter-btn">enter</button>

    </div>
  </div>

  <!-- Location overlay — floats over map when a watercourse is selected -->
  <div id="location-overlay">
    <div class="overlay-panel">
      <div class="overlay-header">
        <div class="overlay-title-group">
          <p class="overlay-watershed" id="ov-watershed"></p>
          <h2 class="overlay-name" id="ov-name"></h2>
          <p class="overlay-desc" id="ov-desc"></p>
        </div>
        <button class="overlay-close-btn" id="overlay-close-btn">✕</button>
      </div>
      <div class="video-grid" id="video-grid"></div>
    </div>
  </div>

  <!-- Detail top controls — outside #detail-view so position:fixed works correctly -->
  <div id="detail-top-controls">
    <button id="detail-play-btn" aria-label="play / pause">||</button>
    <button id="detail-close-btn" aria-label="close">✕</button>
  </div>

  <!-- Detail view — full-screen video with overlaid text/image content -->
  <div id="detail-view">
    <div id="detail-video-bg"></div>
    <div class="detail-overlay">
      <div class="detail-content" id="detail-content"></div>
    </div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <script src="app.js"></script>
</body>
</html>
